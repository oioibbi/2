<!doctype html>
<html lang="zh-Hans">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>鏈ㄩ奔鎵撶姜</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand">
          <div class="title">鏈ㄩ奔鎵撶姜</div>
          <div class="subtitle">鎵撶缃爾锛岃浆鎴愬姛寰凤紙閫氬叧鎵嶅叆璐︼級</div>
        </div>
        <div class="top-actions">
          <button id="btnModeCampaign" class="btn btn-primary">闂叧</button>
          <button id="btnModeEndless" class="btn">鏃犲敖</button>
          <button id="btnRecords" class="btn">鍔熷痉姒?/button>
          <button id="btnLandscape" class="btn">妯睆锛氬叧</button>
          <button id="btnAudio" class="btn">鐏甸煶锛氬紑</button>
        </div>
      </header>

      <main class="stage">
        <div class="game-shell">
          <canvas id="game" width="960" height="540" aria-label="鏈ㄩ奔鎵撶姜娓告垙鐢诲竷"></canvas>
          <div class="hud" aria-live="polite">
            <div class="hud-row hud-row-primary">
              <div class="pill hud-critical" id="hudMode">妯″紡锛氣€?/div>
              <div class="pill hud-critical" id="hudLevel">灏忓叧锛氣€?/div>
              <div class="pill hud-critical" id="hudTitle">澧冪晫锛氣€?/div>
              <div class="pill hud-critical" id="hudLives">鍛斤細鈥?/div>
            </div>
            <div class="hud-row hud-row-secondary">
              <div class="pill pill-gold hud-critical" id="hudPending">鏈叧鍔熷痉锛氣€?/div>
              <div class="pill hud-extra" id="hudBanked">宸插叆璐︼細鈥?/div>
              <div class="pill hud-extra" id="hudTotal">浣欓鍔熷痉锛氣€?/div>
              <div class="pill hud-extra" id="hudLifetime">绱鍔熷痉锛氣€?/div>
            </div>
            <div class="hud-row small">
              <div class="hint">鎷栧姩/绉诲姩鎺у埗鎸℃澘锛涚偣鍑诲彂灏勶紱P 鏆傚仠锛汻 閲嶅紑鏈叧</div>
            </div>
          </div>
          <div id="mobileTip" class="mobile-tip hidden" aria-live="polite"></div>
        </div>
        <div id="overlay" class="overlay hidden">
          <div class="panel">
            <div class="panel-title" id="overlayTitle">鈥?/div>
            <div class="panel-body" id="overlayBody"></div>
            <div class="panel-actions">
              <button id="btnOverlayPrimary" class="btn btn-primary">缁х画</button>
              <button id="btnOverlaySecondary" class="btn">杩斿洖</button>
            </div>
          </div>
        </div>

        <div id="records" class="records hidden" role="dialog" aria-modal="true" aria-label="鍔熷痉姒滀笌鍘嗗彶璁板綍">
          <div class="panel panel-wide">
            <div class="panel-title">鍔熷痉姒滀笌鍘嗗彶</div>
            <div class="tabs">
              <button class="tab active" data-tab="leaderboard">鎺掕姒?/button>
              <button class="tab" data-tab="history">鍘嗗彶璁板綍</button>
              <button class="tab" data-tab="profile">绱鍔熷痉</button>
              <button class="tab" data-tab="shop">鍟嗗簵</button>
              <button class="tab" data-tab="titles">澧冪晫</button>
            </div>
            <div class="tab-body" id="tabBody"></div>
            <div class="panel-actions">
              <button id="btnCloseRecords" class="btn btn-primary">鍏抽棴</button>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script src="game.js"></script>
  </body>
</html>
